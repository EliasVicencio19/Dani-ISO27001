# docker-compose.yml
version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: dani_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dani12345
      POSTGRES_DB: dani_project_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dani_redis
    ports:
      - "6380:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: